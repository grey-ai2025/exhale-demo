<style>
  :root {
    --bg: #0a0a0f;
    --bg-warm: #111118;
    --surface: #16161e;
    --ink: #E8F0EE;
    --ink-soft: #9BA8A5;
    --ink-muted: #5A6664;
    --accent: #5CECD3;
    --accent-soft: #2A7A6E; 
    --accent-bg: rgba(92, 236, 211, 0.08);
    --user-bg: #5CECD3;
    --user-text: #0a0a0f;
    --bot-bg: #16161e;
    --border: #1E1E28;
    --shadow: rgba(0, 0, 0, 0.2);
    --shadow-md: rgba(0, 0, 0, 0.35);
    --radius: 20px;
    --radius-sm: 12px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 520px;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
  }

  @media (min-width: 540px) {
    body { background: #06060a; }
    .app {
      margin-top: 24px;
      height: calc(100dvh - 48px);
      border-radius: 24px;
      box-shadow: 0 8px 40px var(--shadow-md), 0 0 0 1px var(--border), 0 0 60px rgba(92, 236, 211, 0.03);
      overflow: hidden;
    }
  }

  /* ---- Header ---- */
  .header {
    padding: 20px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(92, 236, 211, 0.15);
  }

  .brand-icon svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .brand-text h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--ink);
    line-height: 1;
  }

  .brand-text {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .brand-text .brand-sep {
    color: var(--accent);
    font-size: 18px;
    line-height: 1;
    font-weight: 400;
    opacity: 0.7;
  }
  .brand-text .brand-tag {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    font-weight: 500;
    text-transform: uppercase;
  }
  .brand-text .brand-accent {
    color: var(--accent);
    font-weight: 600;
  }

  .rate-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-warm);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }

  .rate-badge.low {
    background: rgba(236, 177, 92, 0.1);
    color: #ECB15C;
    border-color: rgba(236, 177, 92, 0.25);
  }

  .rate-badge.depleted {
    background: rgba(236, 92, 92, 0.1);
    color: #EC5C5C;
    border-color: rgba(236, 92, 92, 0.25);
  }

  .rate-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(92, 236, 211, 0.4);
  }

  .rate-badge.low .rate-dot { background: #ECB15C; box-shadow: 0 0 6px rgba(236, 177, 92, 0.4); }
  .rate-badge.depleted .rate-dot { background: #EC5C5C; box-shadow: 0 0 6px rgba(236, 92, 92, 0.4); }

  .clear-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--bg-warm);
    border: 1px solid var(--border);
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .clear-btn:hover {
    color: #EC5C5C;
    border-color: rgba(236, 92, 92, 0.35);
    background: rgba(236, 92, 92, 0.08);
  }
  .clear-btn:active { transform: scale(0.92); }

  .demo-bar {
    margin-top: 12px;
    background: rgba(92, 236, 211, 0.06);
    border: 1px solid rgba(92, 236, 211, 0.12);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11.5px;
    color: var(--ink-soft);
    font-weight: 500;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .demo-bar svg {
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ---- Messages ---- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 85%;
    padding: 12px 16px;
    line-height: 1.55;
    font-size: 14.5px;
    animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    word-break: break-word;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    color: var(--user-text);
    border-radius: var(--radius) var(--radius) 6px var(--radius);
    font-weight: 550;
    box-shadow: 0 2px 12px rgba(92, 236, 211, 0.15);
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--bot-bg);
    color: var(--ink);
    border-radius: var(--radius) var(--radius) var(--radius) 6px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 3px var(--shadow);
  }

  .msg.bot b, .msg.bot strong { font-weight: 650; color: #ADFBF6; }
  .msg.bot i, .msg.bot em { color: var(--ink-soft); }
  .msg.bot a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: var(--accent-soft);
  }
  .msg.bot a:hover { text-decoration-color: var(--accent); color: #ADFBF6; }

  .msg.error {
    align-self: center;
    background: rgba(236, 92, 92, 0.1);
    color: #EC5C5C;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    max-width: 90%;
    border: 1px solid rgba(236, 92, 92, 0.25);
  }

  .msg.welcome {
    align-self: center;
    text-align: center;
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 32px 20px;
    max-width: 100%;
  }

  .welcome-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 18px;
    display: block;
    filter: drop-shadow(0 0 24px rgba(92, 236, 211, 0.22));
  }
  .welcome-icon svg { width: 100%; height: 100%; display: block; }

  @media (prefers-reduced-motion: reduce) {
    .welcome-icon animate { display: none; }
  }

  .welcome h2 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .welcome p {
    color: var(--ink-muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--font-body);
  }

  .suggestion:hover {
    background: rgba(92, 236, 211, 0.08);
    border-color: var(--accent-soft);
    color: var(--accent);
    transform: translateY(-1px);
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 16px 20px;
    background: var(--bot-bg);
    border-radius: var(--radius) var(--radius) var(--radius) 6px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 3px var(--shadow);
    animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink-muted);
    animation: bounce 1.4s infinite ease-in-out;
  }

  .typing span:nth-child(1) { animation-delay: 0s; }
  .typing span:nth-child(2) { animation-delay: 0.16s; }
  .typing span:nth-child(3) { animation-delay: 0.32s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ---- Input ---- */
  .input-area {
    padding: 12px 16px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .input-area { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 6px 6px 6px 16px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .input-wrap:focus-within {
    border-color: var(--accent-soft);
    box-shadow: 0 0 0 3px rgba(92, 236, 211, 0.08);
  }

  .input-wrap textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
    background: transparent;
    padding: 8px 0;
    min-height: 22px;
    max-height: 120px;
  }

  .input-wrap textarea::placeholder {
    color: var(--ink-muted);
    font-weight: 400;
  }

  .send-btn {
    width: 40px;
    height: 40px;
    border: none;
    background: var(--accent);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
    color: var(--bg);
    box-shadow: 0 2px 10px rgba(92, 236, 211, 0.2);
  }

  .send-btn:hover { background: #ADFBF6; transform: scale(1.05); box-shadow: 0 2px 16px rgba(92, 236, 211, 0.35); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn svg {
    width: 18px;
    height: 18px;
  }

  /* ---- Utilities ---- */
  .hidden { display: none !important; }

  @media (max-width: 380px) {
    .header { padding: 16px 16px 12px; }
    .brand-text h1 { font-size: 19px; }
    .msg { font-size: 14px; }
  }
</style>
</head>

<script>
const WEBHOOK_URL = 'https://n8n.srv1203909.hstgr.cloud/webhook/exhale-demo';
const STORAGE_KEY = 'exhale-demo';

const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $sendBtn = document.getElementById('sendBtn');
const $rateBadge = document.getElementById('rateBadge');
const $rateText = document.getElementById('rateText');
const $clearBtn = document.getElementById('clearBtn');

let sessionId = localStorage.getItem(STORAGE_KEY + '-sid');
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem(STORAGE_KEY + '-sid', sessionId);
}

// Persistent client id — used for rate limiting, never reset on clear
let clientId = localStorage.getItem(STORAGE_KEY + '-cid');
if (!clientId) {
  clientId = crypto.randomUUID();
  localStorage.setItem(STORAGE_KEY + '-cid', clientId);
}

let remaining = parseInt(localStorage.getItem(STORAGE_KEY + '-rem') || '10', 10);
let sending = false;

function updateRate(n) {
  if (n !== undefined && n !== null) {
    remaining = n;
    localStorage.setItem(STORAGE_KEY + '-rem', String(remaining));
  }
  $rateText.textContent = remaining + ' left';
  $rateBadge.classList.remove('low', 'depleted');
  if (remaining <= 0) $rateBadge.classList.add('depleted');
  else if (remaining <= 5) $rateBadge.classList.add('low');
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    $messages.scrollTop = $messages.scrollHeight;
  });
}

function formatResponse(text) {
  let out = text;
  // Convert Markdown bold **text** to <b>text</b> (but skip if already HTML)
  out = out.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  // Convert Markdown italic _text_ (single underscore, not in URLs)
  out = out.replace(/(?<![\/\w])_([^_]+?)_(?!\w)/g, '<i>$1</i>');
  // Convert Markdown links [text](url) to <a> tags
  out = out.replace(/\[([^\]]+?)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Convert plain URLs not already in href="" or >url< to clickable links
  out = out.replace(/(?<!href="|">)(https?:\/\/[^\s<)"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // Convert line breaks
  out = out.replace(/\n/g, '<br>');
  // Convert "- " list items to cleaner format
  out = out.replace(/(^|<br>)\s*[-–]\s+/g, '$1<span style="display:inline-block;width:8px;margin-right:6px;color:var(--accent)">&#8226;</span>');
  return out;
}

function addMessage(html, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.innerHTML = html;
  $messages.appendChild(el);
  scrollToBottom();
  return el;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  $messages.appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function clearWelcome() {
  const w = $messages.querySelector('.welcome');
  if (w) w.remove();
}

// Load saved messages
const savedMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY + '-msgs') || '[]');
if (savedMsgs.length > 0) {
  clearWelcome();
  savedMsgs.forEach(m => addMessage(m.html, m.cls));
}

function saveMsgs() {
  const all = $messages.querySelectorAll('.msg:not(.welcome)');
  const arr = [];
  all.forEach(el => {
    const cls = el.classList.contains('user') ? 'user' : el.classList.contains('error') ? 'error' : 'bot';
    arr.push({ html: el.innerHTML, cls });
  });
  // Keep last 50 messages to avoid bloating localStorage
  localStorage.setItem(STORAGE_KEY + '-msgs', JSON.stringify(arr.slice(-50)));
}

async function send(text) {
  if (!text.trim() || sending) return;
  if (remaining <= 0) {
    addMessage('You\'ve used all 10 questions for this demo.', 'error');
    saveMsgs();
    return;
  }

  sending = true;
  clearWelcome();
  $sendBtn.disabled = true;
  $input.value = '';
  autoResize();

  addMessage(text.replace(/</g, '&lt;').replace(/>/g, '&gt;'), 'user');
  saveMsgs();
  showTyping();

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatInput: text, sessionId, clientId })
    });

    hideTyping();

    if (res.status === 429) {
      updateRate(0);
      addMessage('Demo limit reached — 10 questions total.', 'error');
    } else if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      addMessage(data.error || 'Something went wrong. Please try again.', 'error');
    } else {
      const data = await res.json();
      if (data.requestsRemaining !== undefined) updateRate(data.requestsRemaining);
      const response = data.response || data.output || 'No response received.';
      addMessage(formatResponse(response), 'bot');
    }
  } catch (err) {
    hideTyping();
    addMessage('Could not reach the server. Check your connection and try again.', 'error');
  }

  saveMsgs();
  sending = false;
  $sendBtn.disabled = !$input.value.trim();
}

// Auto-resize textarea
function autoResize() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
}

$input.addEventListener('input', () => {
  autoResize();
  $sendBtn.disabled = !$input.value.trim() || sending;
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send($input.value);
  }
});

$sendBtn.addEventListener('click', () => send($input.value));

$clearBtn.addEventListener('click', () => {
  if (sending) return;
  // Wipe stored messages but preserve rate-limit counter
  localStorage.removeItem(STORAGE_KEY + '-msgs');
  // New session id so the bot's memory doesn't carry old context
  sessionId = crypto.randomUUID();
  localStorage.setItem(STORAGE_KEY + '-sid', sessionId);
  // Clear DOM and restore the welcome screen
  $messages.innerHTML = `
    <div class="msg welcome">
      <div class="welcome-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none"><defs><linearGradient id="welcomeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ADFBF6"/><stop offset="100%" stop-color="#5CECD3"/></linearGradient></defs><circle cx="36" cy="36" r="6" fill="url(#welcomeGrad)" opacity="0.95"/><circle cx="36" cy="36" r="10" stroke="url(#welcomeGrad)" stroke-width="1.4" fill="none" opacity="0.55"><animate attributeName="r" values="10;30;10" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/><animate attributeName="opacity" values="0.55;0;0.55" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></circle><circle cx="36" cy="36" r="10" stroke="url(#welcomeGrad)" stroke-width="1.2" fill="none" opacity="0"><animate attributeName="r" values="10;30;10" dur="6s" begin="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/><animate attributeName="opacity" values="0.45;0;0.45" dur="6s" begin="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></circle><circle cx="36" cy="36" r="10" stroke="url(#welcomeGrad)" stroke-width="1" fill="none" opacity="0"><animate attributeName="r" values="10;30;10" dur="6s" begin="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/><animate attributeName="opacity" values="0.35;0;0.35" dur="6s" begin="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></circle></svg></div>
      <h2>Breathe in. Breathe out.</h2>
      <p>Ask me about school schedules, emails, homework, closures, and aftercare for the kids.</p>
      <div class="suggestions">
        <button class="suggestion" data-q="What do I need to know today?">Today's briefing</button>
        <button class="suggestion" data-q="Is school closed tomorrow?">School closures</button>
        <button class="suggestion" data-q="What are Jameson's spelling words?">Spelling words</button>
        <button class="suggestion" data-q="Any new emails?">Recent emails</button>
      </div>
    </div>`;
  $input.focus();
});

// Suggestion buttons
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('suggestion')) {
    send(e.target.dataset.q);
  }
});

updateRate();
</script>
